name: CI
on: { push: { branches: [master] }, pull_request: null, workflow_call: null }
permissions: { contents: read }
jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/ready
      - run: runner install --pm=bun generate bundle
      - run: run -p typecheck verify test lint
      - run: run package.json:version
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/ready
      - run: runner install --pm=deno deno:ci
