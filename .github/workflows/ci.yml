name: CI
on: { push: { branches: [master] }, pull_request: null, workflow_call: null }
permissions: { contents: read }
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
      - run: bun install --ignore-scripts
      - run: bun --sequential generate bundle
      - run: bun --parallel typecheck verify test lint
      - run: node bin/recipe-tmlang.mjs --version
