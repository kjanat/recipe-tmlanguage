name: Publish to JSR
on: { workflow_call: null }
jobs:
  publish:
    name: Publish @kjanat/recipe-tmlanguage
    runs-on: ubuntu-latest
    permissions: { contents: read, id-token: write }
    environment: { name: jsr, url: "${{ steps.meta.outputs.url }}" }
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/ready
      - run: runner install --pm=deno deno:generate
      - id: meta
        run: echo "url=https://jsr.io/$(yq -r .name deno.json)@$(yq -r .version deno.json)" >> "$GITHUB_OUTPUT"
      - run: bunx jsr publish
